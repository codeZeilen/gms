name: check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/codezeilen/piam-ci-test-image:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install
        shell: Rscript {0}
        run: pak::pak()
          
      - name: Run pre-commit checks
        shell: bash
        run: |
          pre-commit run --show-diff-on-failure --color=always --all-files

      - name: Verify validation key
        shell: Rscript {0}
        run: lucode2:::validkey(stopIfInvalid = TRUE)

      - name: Verify that lucode2::buildLibrary was successful
        if: github.event_name == 'pull_request'
        shell: Rscript {0}
        run: lucode2:::isVersionUpdated()

      - name: Checks
        shell: Rscript {0}
        run: |
          options(crayon.enabled = TRUE)
          lucode2::check(runLinter = FALSE)

      - name: Test coverage
        if: ${{ github.event_name != 'pull_request' }}
        shell: Rscript {0}
        run: |
          nonDummyTests <- setdiff(list.files("./tests/testthat/"), c("test-dummy.R", "_snaps"))
          if(length(nonDummyTests) > 0 && !lucode2:::loadBuildLibraryConfig()[["skipCoverage"]]) covr::codecov(quiet = FALSE, token = "${{ secrets.CODECOV_TOKEN }}")
        env:
          NOT_CRAN: "true"
